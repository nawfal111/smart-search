<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--vscode-font-family);
        font-size: var(--vscode-font-size);
        background: var(--vscode-editor-background);
        color: var(--vscode-foreground);
        padding: 16px;
      }

      h2 {
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        margin-bottom: 12px;
      }

      .workspace-bar {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--vscode-input-background);
        padding: 5px 8px;
        margin-bottom: 10px;
        font-size: 11px;
        border-radius: 2px;
      }
      .ws-name {
        font-weight: 600;
      }
      .ws-path {
        opacity: 0.6;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .search-type-toggle {
        display: flex;
        background: var(--vscode-merge-header-background);
        padding: 2px;
        border-radius: 4px;
        margin-bottom: 12px;
        gap: 2px;
      }
      .type-btn {
        flex: 1;
        border: none;
        background: transparent;
        color: var(--vscode-foreground);
        padding: 6px;
        cursor: pointer;
        font-size: 11px;
        border-radius: 2px;
        transition: background 0.2s;
      }
      .type-btn.active {
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
      }

      .input-row {
        display: flex;
        gap: 6px;
        margin-bottom: 6px;
      }
      .input-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        position: relative;
      }

      input[type="text"] {
        width: 100%;
        padding: 6px 8px;
        background: var(--vscode-input-background);
        color: var(--vscode-input-foreground);
        border: 1px solid var(--vscode-input-border, transparent);
        border-radius: 2px;
        outline: none;
      }
      input[type="text"]:focus {
        border-color: var(--vscode-focusBorder);
      }

      .toggle-btns {
        display: flex;
        gap: 2px;
        margin-left: 6px;
      }
      .toggle-btn {
        width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border-radius: 3px;
        cursor: pointer;
        opacity: 0.6;
        color: var(--vscode-foreground);
        border: 1px solid transparent;
      }
      .toggle-btn.active {
        opacity: 1;
        background: var(--vscode-inputOption-activeBackground);
        border-color: var(--vscode-inputOption-activeBorder);
      }

      button.action-btn {
        padding: 6px 14px;
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
        border: none;
        border-radius: 2px;
        cursor: pointer;
      }
      button.secondary-btn {
        background: var(--vscode-button-secondaryBackground);
      }

      #result {
        margin-top: 14px;
      }
      .status-line {
        font-size: 11px;
        margin-bottom: 8px;
        opacity: 0.8;
      }
      .ai-status-box {
        padding: 10px;
        background: var(--vscode-textBlockQuote-background);
        border-left: 3px solid var(--vscode-button-background);
        font-size: 12px;
      }

      .result-group {
        margin-bottom: 2px;
      }
      .result-file {
        font-size: 11px;
        font-weight: 600;
        padding: 4px 8px;
        background: var(--vscode-sideBarSectionHeader-background);
        display: flex;
        align-items: center;
        cursor: pointer;
        border-radius: 2px;
      }
      .result-file:hover {
        background: var(--vscode-list-hoverBackground);
      }
      .chevron {
        width: 16px;
        display: inline-block;
        transition: transform 0.1s;
        font-style: normal;
        text-align: center;
        margin-right: 4px;
      }
      .result-group.collapsed .chevron {
        transform: rotate(-90deg);
      }
      .result-group.collapsed .result-items-list {
        display: none;
      }

      .result-item {
        display: flex;
        cursor: pointer;
        font-family: var(--vscode-editor-font-family, monospace);
        font-size: 12px;
        border-left: 2px solid transparent;
      }
      .result-item:hover {
        background: var(--vscode-list-hoverBackground);
        border-left-color: var(--vscode-focusBorder);
      }
      .line-num {
        padding: 3px 8px;
        color: var(--vscode-editorLineNumber-foreground);
        min-width: 40px;
        text-align: right;
        opacity: 0.7;
      }
      .line-content {
        padding: 3px 8px;
        white-space: pre;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
      }
      mark {
        background: var(--vscode-editor-findMatchHighlightBackground);
        color: inherit;
      }

      .no-results {
        font-size: 12px;
        opacity: 0.6;
        padding: 10px 0;
      }
      .error-msg {
        color: var(--vscode-errorForeground);
        font-size: 12px;
        padding: 10px;
        background: var(--vscode-inputValidation-errorBackground);
      }
    </style>
  </head>
  <body>
    <h2>Smart Search</h2>

    <div class="workspace-bar">
      <span class="ws-name" id="wsName"></span>
      <span class="ws-path" id="wsPath"></span>
    </div>

    <div class="search-type-toggle">
      <button id="modeNormal" class="type-btn active">Normal Search</button>
      <button id="modeAI" class="type-btn">AI Search</button>
    </div>

    <div id="searchControls">
      <div class="input-row">
        <div class="input-wrap">
          <input id="query" type="text" placeholder="Search…" />
          <div class="toggle-btns" id="normalOnlyToggles">
            <button class="toggle-btn" id="btnCase" title="Match Case">
              Aa
            </button>
            <button class="toggle-btn" id="btnWord" title="Match Whole Word">
              W
            </button>
            <button class="toggle-btn" id="btnRegex" title="Use Regex">
              .*
            </button>
          </div>
        </div>
      </div>

      <div class="input-row" id="replaceRow">
        <input id="replaceQuery" type="text" placeholder="Replace…" />
        <button class="action-btn secondary-btn" id="replaceBtn">
          Replace
        </button>
        <button class="action-btn secondary-btn" id="replaceAllBtn">All</button>
      </div>

      <div class="input-row">
        <input
          id="filesInclude"
          type="text"
          placeholder="Include (e.g. *.ts)"
        />
        <input id="filesExclude" type="text" placeholder="Exclude" />
      </div>

      <button
        class="action-btn"
        id="searchBtn"
        style="width: 100%; margin-top: 4px"
      >
        Search
      </button>
    </div>

    <div id="result"></div>

    <script>
      const vscode = acquireVsCodeApi();

      const queryEl = document.getElementById("query");
      const replaceEl = document.getElementById("replaceQuery");
      const resultEl = document.getElementById("result");

      let searchType = "normal";
      let matchCase = false,
        matchWord = false,
        useRegex = false;
      let lastResultsData = [];

      document.getElementById("modeNormal").onclick = () => {
        searchType = "normal";
        document.getElementById("modeNormal").classList.add("active");
        document.getElementById("modeAI").classList.remove("active");
        document.getElementById("normalOnlyToggles").style.visibility =
          "visible";
        document.getElementById("replaceRow").style.display = "flex";
      };

      document.getElementById("modeAI").onclick = () => {
        searchType = "ai";
        document.getElementById("modeAI").classList.add("active");
        document.getElementById("modeNormal").classList.remove("active");
        document.getElementById("normalOnlyToggles").style.visibility =
          "hidden";
        document.getElementById("replaceRow").style.display = "none"; // Hide replace for AI for now
      };

      document.getElementById("btnCase").onclick = function () {
        matchCase = !matchCase;
        this.classList.toggle("active", matchCase);
      };
      document.getElementById("btnWord").onclick = function () {
        matchWord = !matchWord;
        this.classList.toggle("active", matchWord);
      };
      document.getElementById("btnRegex").onclick = function () {
        useRegex = !useRegex;
        this.classList.toggle("active", useRegex);
      };

      [
        queryEl,
        document.getElementById("filesInclude"),
        document.getElementById("filesExclude"),
      ].forEach((el) => {
        el.onkeydown = (e) => {
          if (e.key === "Enter") doSearch();
        };
      });

      document.getElementById("searchBtn").onclick = doSearch;

      document.getElementById("replaceBtn").onclick = () => {
        if (lastResultsData.length)
          vscode.postMessage({
            command: "replace",
            result: lastResultsData[0],
            replaceText: replaceEl.value,
          });
      };

      document.getElementById("replaceAllBtn").onclick = () => {
        if (lastResultsData.length)
          vscode.postMessage({
            command: "replaceAll",
            results: lastResultsData,
            replaceText: replaceEl.value,
          });
      };

      function doSearch() {
        vscode.postMessage({
          command: "search",
          query: queryEl.value,
          searchType,
          matchCase,
          matchWholeWord: matchWord,
          useRegex,
          filesInclude: document.getElementById("filesInclude").value,
          filesExclude: document.getElementById("filesExclude").value,
        });
      }

      function renderResults(data) {
        if (data.message) {
          resultEl.innerHTML = `<div class="ai-status-box">${data.message}</div>`;
          return;
        }

        lastResultsData = data.results || [];
        if (!lastResultsData.length) {
          resultEl.innerHTML =
            '<div class="no-results">No results found.</div>';
          return;
        }

        const wsPath = data.workspacePath || "";
        const byFile = {};
        lastResultsData.forEach((r) => {
          if (!byFile[r.file]) byFile[r.file] = [];
          byFile[r.file].push(r);
        });
        const filesCount = Object.keys(byFile).length;

        let html =
          '<div class="status-line">Found <strong>' +
          data.total +
          "</strong> results in <strong>" +
          filesCount +
          "</strong> files (" +
          data.time_ms +
          "ms)</div>";

        for (const [filePath, hits] of Object.entries(byFile)) {
          const displayPath = filePath.startsWith(wsPath)
            ? filePath.slice(wsPath.length).replace(/^[\\/]/, "")
            : filePath;
          html += `<div class="result-group">
            <div class="result-file" onclick="this.parentElement.classList.toggle('collapsed')">
              <i class="chevron">▼</i>${escHtml(displayPath)}
            </div>
            <div class="result-items-list">`;

          hits.forEach((hit) => {
            let lineText = hit.content;
            let highlighted = "";
            let lastIdx = 0;
            const matches = [...(hit.matches || [])].sort(
              (a, b) => a[0] - b[0],
            );

            matches.forEach(([start, end]) => {
              highlighted += escHtml(lineText.substring(lastIdx, start));
              highlighted +=
                "<mark>" + escHtml(lineText.substring(start, end)) + "</mark>";
              lastIdx = end;
            });
            highlighted += escHtml(lineText.substring(lastIdx));

            const safePath = filePath
              .replace(/\\/g, "\\\\")
              .replace(/'/g, "\\'");
            const matchJson = JSON.stringify(matches[0] || null);

            html += `<div class="result-item" onclick="openFile('${safePath}', ${hit.line}, ${matchJson})">
              <span class="line-num">${hit.line}</span>
              <span class="line-content">${highlighted}</span>
            </div>`;
          });
          html += "</div></div>";
        }
        resultEl.innerHTML = html;
      }

      function openFile(file, line, match) {
        vscode.postMessage({ command: "openFile", file, line, match });
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      window.addEventListener("message", (event) => {
        const msg = event.data;
        switch (msg.command) {
          case "workspaceInfo":
            document.getElementById("wsName").textContent = msg.workspaceName;
            document.getElementById("wsPath").textContent = msg.workspacePath;
            break;
          case "searchLoading":
            resultEl.innerHTML = "Searching...";
            break;
          case "searchResult":
            renderResults(msg.data);
            break;
          case "searchError":
            resultEl.innerHTML =
              '<div class="error-msg">' + msg.error + "</div>";
            break;
          case "replaceComplete":
            doSearch();
            break;
        }
      });

      vscode.postMessage({ command: "webviewReady" });
    </script>
  </body>
</html>
